<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Sign Up Form</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="sidebar">
        <div class="banner">
            <img src="resources/img/odin-lined.png" alt="logo"><h1>ODIN</h1>
        </div>
        <p class="sidebar-footer">
            Photo by <a href="https://unsplash.com/@haliewestphoto" target="_blank">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA" target="_blank">Unsplash</a>
        </p>
    </div>
    <main>
        <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.<br>Sign up <em>now</em> to get started.</p>
        <p>You <em>know</em> you want to.</p>

        <form action="" id="sing-up-form">
            <div class="form-container">
                
                <p>Let's do this!</p>

                <div class="form-input-container">
                    <div class="form-field">
                        <label for="first-name">First Name*</label>
                        <input type="text" name="firstName" id="first-name" required>
                    </div>
                    <div class="form-field">
                        <label for="last-name">Last Name</label>
                        <input type="text" name="lastName" id="last-name">
                    </div>
                    <div class="form-field">
                        <label for="email">Email*</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    <div class="form-field">
                        <label for="phone-number">Phone Number</label>
                        <input type="tel" name="phoneNumber" id="phone-number">
                    </div>
                    <div class="form-field">
                        <label for="password">Password*</label>
                        <input type="password" name="password" id="password" required>
                    </div>
                    <div class="form-field">
                        <label for="confirm-password">Confirm Password*</label>
                        <input type="password" name="confirmPassword" id="confirm-password" required>
                    </div>
                </div>
                
            </div>
            
            <button>Create Account</button>
        </form>
        <p class="login-label">Already have an account? <a href="">Log in</a></p>
    </main>
</body>
</html>
